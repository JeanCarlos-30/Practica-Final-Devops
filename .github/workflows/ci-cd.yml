name:  CI/CD Pipeline — Test, Build, Push & Deploy

on:
  push:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────
  # JOB 1: Instalar dependencias y correr tests
  # ─────────────────────────────────────────
  test:
    name:  Instalar y Ejecutar Pruebas
    runs-on: ubuntu-latest

    steps:
      - name:  Clonar repositorio
        uses: actions/checkout@v4

      - name:  Configurar Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name:  Instalar dependencias
        run: npm install

      - name:  Ejecutar pruebas unitarias
        run: npm test
        env:
          NODE_ENV: test

  # ─────────────────────────────────────────
  # JOB 2: Build y Push a Docker Hub
  # ─────────────────────────────────────────
  build-and-push:
    name:  Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test   # Solo corre si los tests pasaron ✅

    steps:
      - name:  Clonar repositorio
        uses: actions/checkout@v4

      - name:  Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name:  Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name:  Extraer metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/hola-mundo-final
          tags: |
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: 🚢 Build y Push a Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────
  # JOB 3: Deploy a Render.com
  # ─────────────────────────────────────────
  deploy:
    name:  Deploy a Render.com
    runs-on: ubuntu-latest
    needs: build-and-push   # Solo corre si el build fue exitoso 

    steps:
      - name:  Trigger deploy en Render.com
        run: |
          curl --fail -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --silent --show-error
          echo " Deploy enviado a Render.com correctamente"